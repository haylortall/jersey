<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>player generator</title>
<meta property="og:title" content="player generator">
<meta property="og:description" content="random jersey assignment">
<meta property="og:image" content="preview.png">
<meta property="og:type" content="website">
<style>
:root {
  --bg:#111111;
  --jersey:#0B2340;
  --text:#ffffff;
  --muted:#8a8a8a;
}
* { margin:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.wrap {
  text-align:center;
  width:min(760px, calc(100vw - 30px));
}
.kicker {
  font-size:12px;
  letter-spacing:3px;
  color:var(--muted);
  margin-bottom:10px;
  text-transform:uppercase;
}
.player {
  font-size:clamp(2.2rem, 6vw, 4.4rem);
  font-weight:800;
  line-height:.95;
  margin-bottom:16px;
  letter-spacing:-.05em;
}
.jersey {
  width:220px;
  height:270px;
  background:linear-gradient(
    to bottom,
    color-mix(in srgb, var(--jersey) 92%, white 8%),
    color-mix(in srgb, var(--jersey) 80%, black 20%)
  );
  margin:0 auto;
  border-radius:28px 28px 38px 38px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 22px 40px rgba(0,0,0,0.42);
  transition:transform .18s ease;
  border:4px solid rgba(255,255,255,.7);
}
.jersey.pop { transform:scale(1.03) rotate(-1deg); }
.collar {
  position:absolute;
  top:-2px;
  left:50%;
  transform:translateX(-50%);
  width:64px;
  height:28px;
  background:#fff;
  clip-path:polygon(0 0,100% 0,82% 100%,18% 100%);
}
.name {
  position:absolute;
  top:38px;
  font-size:12px;
  letter-spacing:2px;
  font-weight:800;
  opacity:0.95;
  text-shadow:
    0 1px 0 rgba(0,0,0,0.4),
    0 0 6px rgba(255,255,255,0.15);
}
.number {
  font-size:96px;
  font-weight:900;
  line-height:1;
}
.controls {
  margin-top:22px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
button {
  background:none;
  border:1px solid #555;
  color:#bbb;
  padding:9px 14px;
  border-radius:20px;
  cursor:pointer;
  font:inherit;
}
button:hover {
  color:white;
  border-color:white;
}
.footer {
  margin-top:16px;
  color:#8a8a8a;
  font-size:.9rem;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">player generator</div>
  <div class="player" id="playerName">BRADY 12</div>

  <div class="jersey" id="jersey">
    <div class="collar"></div>
    <div class="name" id="name">BRADY</div>
    <div class="number" id="number">12</div>
  </div>

  <div class="controls">
    <button id="again">again</button>
    <button id="wiki">player wiki</button>
  </div>

  <div class="footer">♡ taylor</div>
</div>

<script>

ki/Brock_Purdy"], ["Bijan Robinson", "ROBINSON", "7", "#A71930", "https://en.wikipedia.org/wiki/Bijan_Robinson"], ["Amon-Ra St. Brown", "ST.BROWN", "14", "#0076B6", "https://en.wikipedia.org/wiki/Amon-Ra_St._Brown"]];
let current = null;

function randomPlayer() {
  current = players[Math.floor(Math.random()*players.length)];
  const [full,last,num,color] = current;

  document.getElementById("playerName").textContent = last + " " + num;
  document.getElementById("name").textContent = last;
  document.getElementById("number").textContent = num;
  document.documentElement.style.setProperty("--jersey", color);

  const jersey = document.getElementById("jersey");
  jersey.classList.remove("pop");
  void jersey.offsetWidth;
  jersey.classList.add("pop");
}

document.body.addEventListener("click", (e) => {
  if(e.target.tagName === "BUTTON") return;
  randomPlayer();
});

document.getElementById("again").onclick = (e) => {
  e.stopPropagation();
  randomPlayer();
};

document.getElementById("wiki").onclick = (e) => {
  e.stopPropagation();
  if(current) {
    window.open(current[4], "_blank");
  }
};

randomPlayer();
</script>
</body>
</html>
